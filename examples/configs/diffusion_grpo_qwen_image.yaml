# Diffusion GRPO configuration for Qwen-Image with PickScore rewards.
#
# This trains a Qwen-Image diffusion model using GRPO (Group Relative Policy
# Optimization) with image quality rewards from PickScore.
#
# Usage:
#   python examples/run_diffusion_grpo.py --config examples/configs/diffusion_grpo_qwen_image.yaml

diffusion_policy:
  model_name: "Qwen/Qwen-Image"
  precision: "bfloat16"
  train_global_batch_size: 32
  train_micro_batch_size: 4
  logprob_batch_size: 4
  max_grad_norm: 1.0
  reference_model: false

  lora:
    enabled: true
    rank: 64
    alpha: 128
    init_weights: "gaussian"
    target_modules:
      - "attn.to_k"
      - "attn.to_q"
      - "attn.to_v"
      - "attn.to_out.0"
      - "attn.add_k_proj"
      - "attn.add_q_proj"
      - "attn.add_v_proj"
      - "attn.to_add_out"
      - "img_mlp.net.0.proj"
      - "img_mlp.net.2"
      - "txt_mlp.net.0.proj"
      - "txt_mlp.net.2"

  fsdp:
    enabled: true
    cpu_offload: false
    activation_checkpointing: true
    mixed_precision_dtype: "bfloat16"

  text_encoder:
    freeze: true

  vae:
    freeze: true
    dtype: "float32"

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 1.0e-4
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1.0e-8

  generation:
    num_inference_steps: 10
    eval_num_inference_steps: 50
    guidance_scale: 4.0
    height: 512
    width: 512
    noise_level: 1.2
    sde_window_size: 2
    sde_window_range_start: 0
    sde_window_range_end: 5

loss_fn:
  ratio_clip_min: 0.2
  ratio_clip_max: 0.2
  adv_clip_max: 5.0
  kl_penalty: 0.0

diffusion_grpo:
  num_prompts_per_step: 4
  num_images_per_prompt: 16
  max_num_epochs: 100
  max_num_steps: 10000
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: 100
  seed: 42

env:
  num_workers: 4
  device: "cuda"
  reward_functions:
    - name: "pickscore"
      weight: 1.0
      kwargs: {}

data:
  train_data_path: "data/prompts/train.txt"
  input_key: "prompt"

checkpointing:
  enabled: true
  checkpoint_dir: "results/diffusion_grpo_qwen_image"
  save_period: 100

logger:
  log_dir: "logs/diffusion_grpo_qwen_image"
  wandb_enabled: false
